name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

# 取消同一分支上的旧构建
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: "22.22.1"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS - Apple Silicon (arm64)
          - platform: macos-latest
            target: aarch64-apple-darwin
            rust_targets: aarch64-apple-darwin
            node_arch: arm64
            node_platform: darwin
            koffi_keep: darwin_arm64
            label: macOS-arm64
          # macOS - Intel (x64)
          - platform: macos-13
            target: x86_64-apple-darwin
            rust_targets: x86_64-apple-darwin
            node_arch: x64
            node_platform: darwin
            koffi_keep: darwin_x64
            label: macOS-x64
          # Windows
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            rust_targets: x86_64-pc-windows-msvc
            node_arch: x64
            node_platform: win
            koffi_keep: win32_x64
            label: Windows
          # Linux
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            rust_targets: x86_64-unknown-linux-gnu
            node_arch: x64
            node_platform: linux
            koffi_keep: linux_x64
            label: Linux

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.label }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── 系统依赖 ──────────────────────────────────────────
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      # ── Rust 工具链 ──────────────────────────────────────
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true

      # ── Node.js ──────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      # ── 准备 bundled 依赖 ────────────────────────────────
      - name: Get openclaw version for cache key
        id: openclaw-version
        shell: bash
        run: |
          VERSION=$(npm view openclaw version 2>/dev/null || echo "unknown")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "openclaw version: $VERSION"

      - name: Cache bundled deps
        id: cache-bundled
        uses: actions/cache@v4
        with:
          path: |
            src-tauri/binaries
            src-tauri/resources
          key: bundled-${{ matrix.target }}-node${{ env.NODE_VERSION }}-openclaw-${{ steps.openclaw-version.outputs.version }}

      - name: Prepare bundled Node.js binary
        if: steps.cache-bundled.outputs.cache-hit != 'true'
        shell: bash
        run: |
          mkdir -p src-tauri/binaries

          if [ "${{ matrix.node_platform }}" = "win" ]; then
            echo "下载 Node.js for Windows x64..."
            curl -L "https://nodejs.org/dist/v${NODE_VERSION}/node-v${NODE_VERSION}-win-x64.zip" -o node.zip
            unzip -j node.zip "*/node.exe" -d src-tauri/binaries/
            mv src-tauri/binaries/node.exe "src-tauri/binaries/node-${{ matrix.target }}.exe"
          else
            echo "下载 Node.js for ${{ matrix.node_platform }}-${{ matrix.node_arch }}..."
            curl -L "https://nodejs.org/dist/v${NODE_VERSION}/node-v${NODE_VERSION}-${{ matrix.node_platform }}-${{ matrix.node_arch }}.tar.gz" -o node.tar.gz
            tar -xzf node.tar.gz --strip-components=2 "*/bin/node"
            mv node "src-tauri/binaries/node-${{ matrix.target }}"
            chmod +x "src-tauri/binaries/node-${{ matrix.target }}"
          fi

          echo "✓ Node.js binary ready:"
          ls -lh src-tauri/binaries/

      - name: Prepare bundled openclaw runtime
        if: steps.cache-bundled.outputs.cache-hit != 'true'
        shell: bash
        run: |
          mkdir -p src-tauri/resources

          echo "安装 openclaw 到临时目录..."
          INSTALL_DIR=$(mktemp -d)
          cd "$INSTALL_DIR"
          npm install openclaw@latest --prefix .

          # npm 会把依赖 hoist 到顶层 node_modules/，需要搬回 openclaw 包内
          echo "将 hoisted 依赖移入 openclaw/node_modules/..."
          OPENCLAW_NM="node_modules/openclaw/node_modules"
          mkdir -p "$OPENCLAW_NM"
          for pkg in node_modules/*/; do
            name=$(basename "$pkg")
            [ "$name" = "openclaw" ] && continue
            [ "$name" = ".package-lock.json" ] && continue
            mv "$pkg" "$OPENCLAW_NM/"
          done
          # 移动 scoped packages (@scope/pkg)
          for scope in node_modules/@*/; do
            [ ! -d "$scope" ] && continue
            scope_name=$(basename "$scope")
            mkdir -p "$OPENCLAW_NM/$scope_name"
            for pkg in "$scope"/*/; do
              [ ! -d "$pkg" ] && continue
              mv "$pkg" "$OPENCLAW_NM/$scope_name/"
            done
          done
          echo "  依赖数量: $(ls "$OPENCLAW_NM" | wc -l)"

          # 精简 koffi：只保留当前平台的构建
          KOFFI_DIR="$OPENCLAW_NM/koffi/build/koffi"
          if [ -d "$KOFFI_DIR" ]; then
            echo "精简 koffi 多平台构建，保留: ${{ matrix.koffi_keep }}"
            for d in "$KOFFI_DIR"/*/; do
              platform_name=$(basename "$d")
              if [ "$platform_name" != "${{ matrix.koffi_keep }}" ]; then
                echo "  删除: $platform_name"
                rm -rf "$d"
              fi
            done
          fi

          # 打包为 tgz（先输出到临时目录，避免 Windows 上 tar 无法处理带盘符的路径）
          echo "打包 openclaw-runtime.tgz..."
          tar -czf openclaw-runtime.tgz -C node_modules/openclaw .
          cp openclaw-runtime.tgz "$GITHUB_WORKSPACE/src-tauri/resources/"

          # 验证 tgz 内容完整性
          echo "验证 tgz 关键文件..."
          tar -tzf openclaw-runtime.tgz | grep -q "^./openclaw.mjs$" || tar -tzf openclaw-runtime.tgz | grep -q "^openclaw.mjs$" || { echo "ERROR: tgz 中缺少 openclaw.mjs"; exit 1; }
          tar -tzf openclaw-runtime.tgz | grep -q "dist/entry.js" || { echo "ERROR: tgz 中缺少 dist/entry.js"; exit 1; }
          tar -tzf openclaw-runtime.tgz | grep -q "node_modules/" || { echo "ERROR: tgz 中缺少 node_modules/"; exit 1; }
          NODE_MODULES_COUNT=$(tar -tzf openclaw-runtime.tgz | grep "^./node_modules/[^/]*/$" | wc -l)
          echo "  openclaw.mjs ✓ | dist/entry.js ✓ | node_modules deps: $NODE_MODULES_COUNT"

          cd "$GITHUB_WORKSPACE"
          rm -rf "$INSTALL_DIR"

          echo "✓ openclaw-runtime.tgz ready:"
          ls -lh src-tauri/resources/

      - name: Verify bundled deps
        shell: bash
        run: |
          echo "=== Bundled binaries ==="
          ls -lh src-tauri/binaries/
          echo "=== Bundled resources ==="
          ls -lh src-tauri/resources/

      # ── 构建 ─────────────────────────────────────────────
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target ${{ matrix.target }}

      # ── 上传构建产物 ─────────────────────────────────────
      - name: Upload macOS arm64 artifacts
        if: matrix.target == 'aarch64-apple-darwin'
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-macos-arm64
          path: |
            src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app
          if-no-files-found: error

      - name: Upload macOS x64 artifacts
        if: matrix.target == 'x86_64-apple-darwin'
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-macos-x64
          path: |
            src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.app
          if-no-files-found: error

      - name: Upload Windows artifacts
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-windows
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
          if-no-files-found: error

      - name: Upload Linux artifacts
        if: matrix.platform == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-linux
          path: |
            src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb
            src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage
          if-no-files-found: error

  # ── 发布 Release ───────────────────────────────────────────
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    name: Create Release
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | head -50

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.app
            artifacts/**/*.msi
            artifacts/**/*.exe
            artifacts/**/*.deb
            artifacts/**/*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
