<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="bodyGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#e8352a"/>
      <stop offset="100%" style="stop-color:#b01e15"/>
    </radialGradient>
    <radialGradient id="clawGrad" cx="40%" cy="40%" r="60%">
      <stop offset="0%" style="stop-color:#e8352a"/>
      <stop offset="100%" style="stop-color:#9a1a12"/>
    </radialGradient>
  </defs>

  <!-- 左钳子 -->
  <g fill="url(#clawGrad)">
    <!-- 左钳臂 -->
    <path d="M62 95 C45 80, 30 75, 25 85 C20 95, 28 110, 45 115 C55 118, 68 112, 72 105 Z"/>
    <!-- 左钳上爪 -->
    <path d="M25 85 C15 75, 12 62, 20 58 C28 54, 38 62, 38 72 C38 78, 32 83, 25 85 Z"/>
    <!-- 左钳下爪 -->
    <path d="M25 85 C14 88, 10 100, 18 106 C26 112, 38 108, 42 100 C44 94, 36 88, 25 85 Z"/>
  </g>

  <!-- 右钳子 -->
  <g fill="url(#clawGrad)">
    <!-- 右钳臂 -->
    <path d="M138 95 C155 80, 170 75, 175 85 C180 95, 172 110, 155 115 C145 118, 132 112, 128 105 Z"/>
    <!-- 右钳上爪 -->
    <path d="M175 85 C185 75, 188 62, 180 58 C172 54, 162 62, 162 72 C162 78, 168 83, 175 85 Z"/>
    <!-- 右钳下爪 -->
    <path d="M175 85 C186 88, 190 100, 182 106 C174 112, 162 108, 158 100 C156 94, 164 88, 175 85 Z"/>
  </g>

  <!-- 身体 -->
  <ellipse cx="100" cy="115" rx="38" ry="45" fill="url(#bodyGrad)"/>

  <!-- 头部 -->
  <ellipse cx="100" cy="82" rx="32" ry="30" fill="url(#bodyGrad)"/>

  <!-- 头顶触角/耳朵 -->
  <ellipse cx="84" cy="56" rx="10" ry="14" fill="#c1241a"/>
  <ellipse cx="116" cy="56" rx="10" ry="14" fill="#c1241a"/>

  <!-- 眼睛白 -->
  <circle cx="88" cy="82" r="9" fill="white"/>
  <circle cx="112" cy="82" r="9" fill="white"/>
  <!-- 眼睛黑 -->
  <circle cx="90" cy="83" r="5.5" fill="#1a1a2e"/>
  <circle cx="114" cy="83" r="5.5" fill="#1a1a2e"/>
  <!-- 眼睛高光 -->
  <circle cx="92" cy="81" r="2" fill="white"/>
  <circle cx="116" cy="81" r="2" fill="white"/>

  <!-- 右侧条纹尾部 -->
  <g fill="#c1241a" opacity="0.9">
    <rect x="130" y="108" width="28" height="7" rx="3.5"/>
    <rect x="133" y="120" width="24" height="7" rx="3.5"/>
    <rect x="136" y="132" width="20" height="7" rx="3.5"/>
    <rect x="139" y="144" width="16" height="7" rx="3.5"/>
    <rect x="142" y="156" width="12" height="6" rx="3"/>
  </g>

  <!-- 身体高光 -->
  <ellipse cx="92" cy="100" rx="12" ry="18" fill="white" opacity="0.12"/>
</svg>
